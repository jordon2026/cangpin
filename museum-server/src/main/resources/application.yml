server:
  port: 8080

spring:
  datasource:
    # 【安全】敏感凭证通过环境变量注入，禁止在此处硬编码
    # 本地开发：设置环境变量 DB_HOST / DB_NAME / DB_USERNAME / DB_PASSWORD
    # 生产部署：通过 Docker -e 或 k8s Secret 注入
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:museum_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:jordon}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接池安全加固
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.jujing.museum.modules.*.entity,com.jujing.museum.modules.*.dto
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: ""
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: false

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: 7200   # 2小时无操作自动过期（防止 token 被盗用后长期有效）
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

knife4j:
  enable: true
  setting:
    language: zh_cn

# 应用自定义安全配置
app:
  cors:
    # 【安全】允许的前端来源，多个用逗号分隔
    # 生产环境通过环境变量 APP_CORS_ALLOWED_ORIGINS 覆盖
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  backup:
    # 备份文件存储路径（Windows 使用绝对路径）
    path: ${BACKUP_PATH:D:/聚景科技/2026/博物馆/备份}
    # MySQL mysqldump 命令路径（留空自动查找）
    mysqldump: ${MYSQLDUMP_PATH:}
    # 最大保留备份文件数量
    max-keep: 30

logging:
  level:
    # 生产环境建议改为 info，避免 debug 日志泄露 SQL 及敏感参数
    com.jujing.museum: debug
    com.jujing.museum.modules.auth.mapper: info   # auth mapper 改为 info，防止 SQL 日志泄露密码 hash
