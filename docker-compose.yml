version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: museum-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: museum_root_2024
      MYSQL_DATABASE: museum_db
      MYSQL_USER: museum
      MYSQL_PASSWORD: museum_password_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./museum-server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - museum-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmuseum_root_2024"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: museum-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - museum-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 后端
  backend:
    image: amazoncorretto:17-alpine
    container_name: museum-backend
    restart: always
    environment:
      # 【服务器部署】连接 MySQL 容器（使用容器 IP）
      DB_HOST: 172.30.0.3
      DB_PORT: 3306
      DB_NAME: museum_db
      DB_USERNAME: museum_user
      DB_PASSWORD: museum2026
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # 备份路径
      BACKUP_PATH: /data/backup
      # 【修复】Docker容器内备份：指定MySQL容器名
      APP_BACKUP_DOCKER_CONTAINER: museum-mysql
      # 【服务器部署】覆盖 datasource URL，连接 MySQL 容器
      SPRING_DATASOURCE_URL: jdbc:mysql://172.30.0.3:3306/museum_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    volumes:
      - ./museum-server/target/museum-server-1.0.0-SNAPSHOT.jar:/app/app.jar
      - backend_data:/data
      # 【修复】挂载 Docker socket 和 docker 二进制文件，以便在容器内执行 docker exec
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker:/usr/libexec/docker:ro
    ports:
      - "8080:8080"
    command: ["sh", "-c", "apk add --no-cache curl fontconfig ttf-dejavu mysql-client && java -jar /app/app.jar"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - museum-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/auth/captcha"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  museum-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  backend_data:
