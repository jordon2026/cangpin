version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: museum-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: museum_root_2024
      MYSQL_DATABASE: museum
      MYSQL_USER: museum
      MYSQL_PASSWORD: museum_password_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./museum-server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - museum-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmuseum_root_2024"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: museum-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - museum-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 后端
  backend:
    build:
      context: ./museum-server
      dockerfile: Dockerfile
    container_name: museum-backend
    restart: always
    environment:
      # 数据库 - 与 application.yml 中的占位符名一致
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: museum
      DB_USERNAME: museum
      DB_PASSWORD: museum_password_2024
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # CORS - 允许所有来源（生产环境可限制具体域名）
      APP_CORS_ALLOWED_ORIGINS: "*"
      # 备份路径
      BACKUP_PATH: /data/backup
      # 【修复】覆盖 datasource URL，关闭 SSL（Docker 内网不需要）
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/museum?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - museum-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/auth/captcha"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  museum-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
