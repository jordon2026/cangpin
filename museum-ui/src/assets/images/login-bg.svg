<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3E2723;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C2E00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#D4B896;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="patternGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#C9A96E;stop-opacity:0.08" />
    </linearGradient>
    <!-- 回纹图案 -->
    <pattern id="huiwen" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M0,0 L80,0 L80,80 L0,80 Z" fill="none" stroke="url(#patternGrad)" stroke-width="1"/>
      <path d="M8,8 L32,8 L32,32 L8,32 Z" fill="none" stroke="url(#patternGrad)" stroke-width="0.8"/>
      <path d="M48,8 L72,8 L72,32 L48,32 Z" fill="none" stroke="url(#patternGrad)" stroke-width="0.8"/>
      <path d="M8,48 L32,48 L32,72 L8,72 Z" fill="none" stroke="url(#patternGrad)" stroke-width="0.8"/>
      <path d="M48,48 L72,48 L72,72 L48,72 Z" fill="none" stroke="url(#patternGrad)" stroke-width="0.8"/>
    </pattern>
    <!-- 云纹图案 -->
    <pattern id="yunwen" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M20,60 Q20,30 50,30 Q80,30 80,50 Q80,70 60,70 Q40,70 40,55 Q40,45 50,45 Q55,45 55,50"
            fill="none" stroke="url(#patternGrad)" stroke-width="0.6" opacity="0.5"/>
      <path d="M80,30 Q110,30 110,55 Q110,80 85,80 Q60,80 60,60"
            fill="none" stroke="url(#patternGrad)" stroke-width="0.6" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- 背景渐变 -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- 回纹底纹 -->
  <rect width="800" height="600" fill="url(#huiwen)" opacity="0.6"/>
  <!-- 云纹叠加 -->
  <rect width="800" height="600" fill="url(#yunwen)"/>
  <!-- 装饰性边框 -->
  <rect x="30" y="30" width="740" height="540" rx="4" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.4"/>
  <rect x="40" y="40" width="720" height="520" rx="2" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <!-- 中央装饰元素 - 简化青铜器纹饰 -->
  <g transform="translate(400,300)" opacity="0.15">
    <circle cx="0" cy="0" r="140" fill="none" stroke="#C9A96E" stroke-width="2"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#C9A96E" stroke-width="1"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#C9A96E" stroke-width="0.8"/>
    <!-- 对称装饰 -->
    <g stroke="#C9A96E" fill="none" stroke-width="1">
      <path d="M-60,-80 Q-60,-40 -30,0 Q0,40 0,80"/>
      <path d="M60,-80 Q60,-40 30,0 Q0,40 0,80"/>
      <path d="M-80,-60 Q-40,-60 0,-30 Q40,0 80,0"/>
      <path d="M-80,60 Q-40,60 0,30 Q40,0 80,0"/>
    </g>
  </g>
  <!-- 四角装饰 -->
  <g stroke="#C9A96E" fill="none" stroke-width="1.5" opacity="0.35">
    <!-- 左上 -->
    <path d="M30,60 L30,30 L60,30"/>
    <path d="M35,50 L35,35 L50,35"/>
    <!-- 右上 -->
    <path d="M740,30 L770,30 L770,60"/>
    <path d="M750,35 L765,35 L765,50"/>
    <!-- 左下 -->
    <path d="M30,540 L30,570 L60,570"/>
    <path d="M35,550 L35,565 L50,565"/>
    <!-- 右下 -->
    <path d="M740,570 L770,570 L770,540"/>
    <path d="M750,565 L765,565 L765,550"/>
  </g>
</svg>
