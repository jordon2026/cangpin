<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E" />
      <stop offset="100%" style="stop-color:#8B4513" />
    </linearGradient>
  </defs>
  <!-- 外框 - 印章风格 -->
  <rect x="2" y="2" width="36" height="36" rx="4" ry="4" fill="url(#logoGrad)" opacity="0.9"/>
  <!-- 内框 -->
  <rect x="5" y="5" width="30" height="30" rx="2" ry="2" fill="none" stroke="#FFFFF0" stroke-width="1.2" opacity="0.8"/>
  <!-- "博" 字简化 - 鼎形图案 -->
  <g transform="translate(20,18)" fill="none" stroke="#FFFFF0" stroke-width="1.2" stroke-linecap="round" opacity="0.9">
    <!-- 鼎身 -->
    <path d="M-8,-8 L8,-8 L6,4 L-6,4 Z" fill="#FFFFF0" opacity="0.2"/>
    <path d="M-8,-8 L8,-8 L6,4 L-6,4 Z"/>
    <!-- 鼎耳 -->
    <path d="M-5,-8 L-5,-12 M5,-8 L5,-12"/>
    <!-- 鼎足 -->
    <path d="M-6,4 L-7,8 M0,4 L0,8 M6,4 L7,8"/>
    <!-- 鼎纹 -->
    <line x1="-4" y1="-4" x2="4" y2="-4" opacity="0.5"/>
    <line x1="-3" y1="-1" x2="3" y2="-1" opacity="0.5"/>
  </g>
  <!-- 底部装饰线 -->
  <line x1="10" y1="34" x2="30" y2="34" stroke="#FFFFF0" stroke-width="0.8" opacity="0.5"/>
</svg>
